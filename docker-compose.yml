version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    env_file:
      - .env
    environment:
      # Direct Google SDK to find credentials mounted in the container
      - GOOGLE_APPLICATION_CREDENTIALS=/home/appuser/.config/gcloud/application_default_credentials.json
    volumes:
      # Mounts local_users.db as a volume to persist SQLite users database locally on the host
      # Registered accounts and sessions are persisted on the host and not lost when the container stops
      - ./local_users.db:/code/local_users.db

      # Mount Google Cloud Application Default Credentials (ADC) from host
      # so the container can authenticate with Vertex AI/Gemini 
      # Windows (PowerShell / CMD default path):
      - ${APPDATA}/gcloud:/home/appuser/.config/gcloud:ro
      # For macOS/Linux developers, comment the line above and uncomment the line below:
      # - ${HOME}/.config/gcloud:/home/appuser/.config/gcloud:ro
